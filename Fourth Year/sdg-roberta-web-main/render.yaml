services:
  - type: web
    name: sustainatrack-ml
    env: python
    plan: free
    region: singapore
    branch: main

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

    envVars:
      - key: HF_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
